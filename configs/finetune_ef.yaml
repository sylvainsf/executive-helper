# Fine-tuning config: Executive Function model
# Base: Phi-3.5-mini-instruct, Method: QLoRA via Unsloth
# Optimized for RTX 4090 (24GB VRAM)

model:
  base: "microsoft/Phi-3.5-mini-instruct"
  max_seq_length: 2048
  bf16: true  # Ampere+ (RTX 30xx/40xx) — use bf16 for stability

lora:
  r: 32           # higher rank for more expressive adaptation
  alpha: 64       # alpha = 2x rank is a common sweet spot
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  path: "data/generated/ef/train.jsonl"

training:
  batch_size: 4           # 4090 can handle larger batches
  gradient_accumulation: 2
  epochs: 5               # more epochs since dataset is small (75 examples)
  learning_rate: 2.0e-4
  warmup_steps: 5         # ~6% of steps
  logging_steps: 5
  save_steps: 50

output:
  dir: "checkpoints/ef"
