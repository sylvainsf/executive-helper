# Fine-tuning config: Executive Function model
# Base: Phi-4-mini-instruct, Method: QLoRA via Unsloth
# Optimized for RTX 4090 (24GB VRAM)

model:
  base: "unsloth/Phi-4-mini-instruct"
  max_seq_length: 2048
  bf16: true  # Ampere+ (RTX 30xx/40xx) — use bf16 for stability

lora:
  r: 32           # higher rank for more expressive adaptation
  alpha: 64       # alpha = 2x rank is a common sweet spot
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  path: "data/generated/ef/train.jsonl"

training:
  batch_size: 4           # 4090 can handle larger batches
  gradient_accumulation: 2
  epochs: 3               # 768 examples × 3 epochs = ~288 steps
  learning_rate: 2.0e-4
  warmup_steps: 10        # ~3% of steps
  logging_steps: 10
  save_steps: 100

output:
  dir: "checkpoints/ef"
