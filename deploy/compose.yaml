services:
  # ── Home Assistant ──────────────────────────────────────────────────────────
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./ha-config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      TZ: ${TZ:-America/New_York}
    depends_on:
      ollama:
        condition: service_healthy

  # ── Ollama (GPU model server) ───────────────────────────────────────────────
  # Serves both the Home LLM model (HA device control) and the EF model
  # (executive function coaching). One instance, two models.
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ./ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Executive Helper Backend ────────────────────────────────────────────────
  # The headless gateway that runs the audio pipeline, intent tracker,
  # and decision journal. All UI lives inside Home Assistant.
  executive-helper:
    container_name: executive-helper
    build:
      context: ./executive-helper
      dockerfile: Dockerfile
    volumes:
      - ./eh-data:/app/data
      - ./executive-helper/prompts:/app/prompts:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    network_mode: host
    environment:
      EH_OLLAMA_HOST: http://localhost:11434
      EH_HA_URL: http://localhost:8123
      EH_HA_TOKEN: ${EH_HA_TOKEN}
      EH_EF_MODEL: ${EH_EF_MODEL:-executive-helper-ef}
    depends_on:
      ollama:
        condition: service_healthy
